<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOT PAN – AI Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Inter;
  background:#0E0E0E;
  color:#F5F5F5;
}

.container {
  max-width:900px;
  margin:auto;
  padding:60px 20px;
}

h1 {
  margin-bottom:30px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

input {
  width:100%;
  padding:14px;
  background:#1A1A1A;
  border:none;
  color:white;
  border-radius:6px;
}

.cta {
  padding:14px;
  background:#D94F2A;
  color:white;
  text-align:center;
  border-radius:6px;
  cursor:pointer;
  margin-top:20px;
}

.card {
  background:#1A1A1A;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}

.small {
  opacity:.6;
  font-size:12px;
}

textarea {
  width:100%;
  height:220px;
  margin-top:20px;
  background:#111;
  color:white;
  border:none;
  padding:10px;
  font-family:monospace;
}
</style>
</head>

<body>

<div class="container">

<h1>HOT PAN – AI Menu Builder</h1>

<div class="grid">
  <input id="name" placeholder="Dish name (any language)">
  <input id="style" placeholder="Style (asian / healthy / fast)">
</div>

<input id="ingredients" placeholder="Ingredients (optional)">

<div class="cta" onclick="generate()">Generate menu</div>

<div id="result"></div>

<h3>menu.json</h3>
<textarea id="output"></textarea>

<div class="small">
Copy → paste into menu.json → commit → refresh web
</div>

</div>

<script>

function translateName(name, lang){
  const dict = {
    de: "Pfanne",
    it: "Padella"
  };
  return name + " " + (dict[lang] || "");
}

function generate(){

  const name = document.getElementById("name").value || "Chicken Bowl";

  const base = Math.floor(Math.random()*3)+10;

  const prices = {
    low: base + "€",
    mid: (base+1) + "€",
    high: (base+2) + "€"
  };

  const menu = {
    en: [{ name: name, price: prices.mid }],
    de: [{ name: translateName(name,"de"), price: prices.mid }],
    it: [{ name: translateName(name,"it"), price: prices.mid }]
  };

  // preview UI
  const res = document.getElementById("result");
  res.innerHTML = "";

  Object.keys(menu).forEach(lang=>{
    const item = menu[lang][0];

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <b>${lang.toUpperCase()}</b><br>
      ${item.name}<br>
      <span class="small">
        low: ${prices.low} | recommended: ${prices.mid} | high: ${prices.high}
      </span>
    `;
    res.appendChild(div);
  });

  // export JSON
  document.getElementById("output").value =
    JSON.stringify(menu, null, 2);
}

</script>

</body>
</html>
