<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOT PAN – Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0E0E0E;
  color: #F5F5F5;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 60px 20px;
}

h1 {
  margin-bottom: 20px;
}

.cta {
  display: inline-block;
  padding: 14px 24px;
  background: #D94F2A;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 20px;
}

.card {
  background: #1A1A1A;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">

  <h1>HOT PAN – Admin</h1>

  <div class="cta" onclick="generateMenu()">Generate Menu (AI)</div>

  <div id="menu"></div>

</div>

<script>

function generateMenu() {

  const base = [
    ["Chicken", "Bowl"],
    ["Beef", "Noodles"],
    ["Tofu", "Stir Fry"],
    ["Spicy", "Rice"],
    ["Garlic", "Pan"],
    ["Chili", "Mix"]
  ];

  const prices = ["10€","11€","12€","13€"];

  let menu = [];

  for (let i = 0; i < 3; i++) {
    const a = base[Math.floor(Math.random() * base.length)];
    const name = a[0] + " " + a[1];
    const price = prices[Math.floor(Math.random() * prices.length)];

    menu.push({ name, price });
  }

  const container = document.getElementById("menu");
  container.innerHTML = "";

  menu.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `${item.name} — ${item.price}`;
    container.appendChild(div);
  });

}

</script>

</body>
</html>
