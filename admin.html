<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOT PAN – Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Inter;
  background:#0E0E0E;
  color:#F5F5F5;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

h1 {
  margin-bottom:30px;
}

.cta {
  background:#D94F2A;
  padding:12px 20px;
  border-radius:6px;
  cursor:pointer;
  display:inline-block;
  margin-bottom:20px;
}

.card {
  background:#1A1A1A;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#111;
  border:none;
  color:white;
}

.row {
  display:flex;
  gap:10px;
}

.small {
  font-size:12px;
  opacity:.6;
}

.toggle {
  cursor:pointer;
  padding:6px 10px;
  border:1px solid #555;
  border-radius:6px;
  margin-right:10px;
}

.toggle.active {
  background:#D94F2A;
}

.price-box {
  display:none;
  margin-top:10px;
}

.price-box.active {
  display:block;
}

textarea {
  width:100%;
  height:200px;
  background:#111;
  color:white;
  margin-top:20px;
  padding:10px;
  font-family:monospace;
}
</style>
</head>

<body>

<div class="container">

<h1>HOT PAN – Menu Builder</h1>

<div class="cta" onclick="addDish()">+ Add dish</div>

<div id="dishes"></div>

<div class="cta" onclick="exportJSON()">Export menu.json</div>

<textarea id="output"></textarea>

</div>

<script>

let dishes = [];

function addDish(){

  const id = Date.now();

  const dish = {
    id,
    name:"",
    ingredients:"",
    price:12,
    customPrice:"",
    max:10,
    reserve:false,
    soldout:false
  };

  dishes.push(dish);
  render();
}

function toggle(id, key){
  const d = dishes.find(x=>x.id===id);
  d[key] = !d[key];
  render();
}

function render(){

  const container = document.getElementById("dishes");
  container.innerHTML = "";

  dishes.forEach(d=>{

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `

    <input placeholder="Dish name (any language)" 
      value="${d.name}" 
      onchange="update(${d.id},'name',this.value)">

    <input placeholder="Ingredients" 
      value="${d.ingredients}" 
      onchange="update(${d.id},'ingredients',this.value)">

    <div class="row">
      <input type="number" placeholder="Max portions"
        value="${d.max}"
        onchange="update(${d.id},'max',this.value)">
    </div>

    <div class="small">Price</div>

    <div class="row">
      <div class="toggle" onclick="setPriceMode(${d.id},'low')">Low</div>
      <div class="toggle active" onclick="setPriceMode(${d.id},'mid')">Recommended</div>
      <div class="toggle" onclick="setPriceMode(${d.id},'high')">High</div>
      <div class="toggle" onclick="toggleCustom(${d.id})">Custom</div>
    </div>

    <div class="price-box ${d.customPrice ? 'active' : ''}">
      <input placeholder="Custom price €" 
        value="${d.customPrice}" 
        onchange="update(${d.id},'customPrice',this.value)">
    </div>

    <div class="row" style="margin-top:10px">
      <div class="toggle ${d.reserve?'active':''}" onclick="toggle(${d.id},'reserve')">Reservation</div>
      <div class="toggle ${d.soldout?'active':''}" onclick="toggle(${d.id},'soldout')">Sold out</div>
    </div>

    <div class="small">
      AI will generate EN / DE / IT automatically
    </div>

    `;

    container.appendChild(div);
  });
}

function update(id,key,val){
  const d = dishes.find(x=>x.id===id);
  d[key]=val;
}

function toggleCustom(id){
  const d = dishes.find(x=>x.id===id);
  d.customPrice = d.customPrice ? "" : "12";
  render();
}

function setPriceMode(id,mode){
  const d = dishes.find(x=>x.id===id);

  const base = Math.floor(Math.random()*3)+10;

  if(mode==="low") d.price = base;
  if(mode==="mid") d.price = base+1;
  if(mode==="high") d.price = base+2;
}

function translate(name,lang){
  if(lang==="de") return name+" Pfanne";
  if(lang==="it") return name+" Padella";
  return name;
}

function exportJSON(){

  const out = { en:[], de:[], it:[] };

  dishes.forEach(d=>{

    const price = d.customPrice || d.price+"€";

    out.en.push({ name:d.name, price });
    out.de.push({ name:translate(d.name,"de"), price });
    out.it.push({ name:translate(d.name,"it"), price });

  });

  document.getElementById("output").value =
    JSON.stringify(out,null,2);
}

</script>

</body>
</html>
