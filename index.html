<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOT PAN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0E0E0E;
  color: #F5F5F5;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 60px 20px;
}

.topbar {
  display: flex;
  justify-content: flex-end;
  gap: 15px;
  margin-bottom: 20px;
}

.lang {
  cursor: pointer;
  opacity: 0.6;
}

.lang.active {
  opacity: 1;
  color: #D94F2A;
}

.hero {
  margin-bottom: 80px;
}

h1 {
  font-size: 72px;
  margin: 0;
  letter-spacing: -2px;
}

.tagline {
  margin-top: 10px;
  font-size: 20px;
  color: #D94F2A;
}

.section {
  margin-bottom: 60px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #1A1A1A;
  padding: 20px;
  border-radius: 10px;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

.menu-item {
  display: flex;
  justify-content: space-between;
}

.cta {
  display: inline-block;
  padding: 14px 24px;
  background: #D94F2A;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 15px;
}

.contact {
  opacity: 0.8;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <span class="lang active" onclick="setLang('en', this)">EN</span>
    <span class="lang" onclick="setLang('de', this)">DE</span>
    <span class="lang" onclick="setLang('it', this)">IT</span>
  </div>

  <div class="hero">
    <h1>HOT PAN</h1>
    <div class="tagline" id="tagline"></div>
  </div>

  <div class="section">
    <h2 id="aboutTitle"></h2>
    <div class="card" id="aboutText"></div>
  </div>

  <div class="section">
    <h2 id="menuTitle"></h2>

    <div class="cta" onclick="generateMenu()">Generate Menu (AI)</div>

    <div class="grid" id="menu"></div>
  </div>

  <div class="section">
    <h2 id="reservationTitle"></h2>
    <div class="card" id="reservationBox">
      <p id="reservationText"></p>
      <div class="cta" onclick="reserveNow()" id="reservationBtn"></div>
    </div>
  </div>

  <div class="section">
    <h2 id="contactTitle"></h2>
    <div class="contact">
      Innsbruck, Austria<br>
      +43 000 000000<br>
      hello@hotpan.at
    </div>
  </div>

</div>

<script>

let currentLang = "en";

const content = {
  en: {
    tagline: "real food. zero friction.",
    aboutTitle: "About",
    aboutText: "A fast kitchen built for real life.",
    menuTitle: "Menu",
    reservationTitle: "Reservation",
    reservationText: "Book your table in seconds.",
    reservationBtn: "Reserve now",
    contactTitle: "Contact"
  },
  de: {
    tagline: "einfach essen. ohne warten.",
    aboutTitle: "Über uns",
    aboutText: "Eine schnelle Küche für den Alltag.",
    menuTitle: "Menü",
    reservationTitle: "Reservierung",
    reservationText: "Reservieren Sie in wenigen Sekunden.",
    reservationBtn: "Jetzt reservieren",
    contactTitle: "Kontakt"
  },
  it: {
    tagline: "cibo vero. senza attesa.",
    aboutTitle: "Chi siamo",
    aboutText: "Una cucina veloce per la vita reale.",
    menuTitle: "Menu",
    reservationTitle: "Prenotazione",
    reservationText: "Prenota in pochi secondi.",
    reservationBtn: "Prenota ora",
    contactTitle: "Contatto"
  }
};

function setLang(lang, el) {
  currentLang = lang;
  document.querySelectorAll(".lang").forEach(e => e.classList.remove("active"));
  el.classList.add("active");
  renderText();
  generateMenu();
}

function renderText() {
  const data = content[currentLang];
  document.getElementById("tagline").innerText = data.tagline;
  document.getElementById("aboutTitle").innerText = data.aboutTitle;
  document.getElementById("aboutText").innerText = data.aboutText;
  document.getElementById("menuTitle").innerText = data.menuTitle;
  document.getElementById("reservationTitle").innerText = data.reservationTitle;
  document.getElementById("reservationText").innerText = data.reservationText;
  document.getElementById("reservationBtn").innerText = data.reservationBtn;
  document.getElementById("contactTitle").innerText = data.contactTitle;
}

function generateMenu() {

  const base = [
    ["Chicken", "Bowl"],
    ["Beef", "Noodles"],
    ["Tofu", "Stir Fry"],
    ["Spicy", "Rice"],
    ["Garlic", "Pan"],
    ["Chili", "Mix"]
  ];

  const prices = ["10€","11€","12€","13€"];

  let menu = [];

  for (let i = 0; i < 3; i++) {
    const a = base[Math.floor(Math.random() * base.length)];
    const name = a[0] + " " + a[1];
    const price = prices[Math.floor(Math.random() * prices.length)];

    menu.push({ name, price });
  }

  const container = document.getElementById("menu");
  container.innerHTML = "";

  menu.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div class="menu-item">
        <span>${item.name}</span>
        <span>${item.price}</span>
      </div>
    `;
    container.appendChild(div);
  });

}

function reserveNow() {
  document.getElementById("reservationBox").innerHTML = "<p>Table booked ✓</p>";
}

renderText();
generateMenu();

</script>

</body>
</html>
