<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOT PAN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0E0E0E;
  color: #F5F5F5;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 60px 20px;
}

.topbar {
  display: flex;
  justify-content: flex-end;
  gap: 15px;
  margin-bottom: 20px;
}

.lang {
  cursor: pointer;
  opacity: 0.6;
}

.lang.active {
  opacity: 1;
  color: #D94F2A;
}

.hero {
  margin-bottom: 80px;
}

h1 {
  font-size: 72px;
  margin: 0;
  letter-spacing: -2px;
}

.tagline {
  margin-top: 10px;
  font-size: 20px;
  color: #D94F2A;
}

.section {
  margin-bottom: 60px;
}

.section h2 {
  margin-bottom: 20px;
  font-weight: 600;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #1A1A1A;
  padding: 20px;
  border-radius: 10px;
  transition: 0.2s;
}

.card:hover {
  background: #222;
  transform: translateY(-3px);
}

.menu-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.cta {
  display: inline-block;
  padding: 14px 24px;
  background: #D94F2A;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  margin-top: 10px;
  font-weight: 600;
  cursor: pointer;
}

.cta:hover {
  background: #ff5c33;
}

.contact {
  opacity: 0.8;
  font-size: 14px;
}

.fade {
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <span class="lang active" onclick="setLang('en', this)">EN</span>
    <span class="lang" onclick="setLang('de', this)">DE</span>
    <span class="lang" onclick="setLang('it', this)">IT</span>
  </div>

  <div class="hero">
    <h1>HOT PAN</h1>
    <div class="tagline" id="tagline"></div>
  </div>

  <div class="section">
    <h2 id="aboutTitle"></h2>
    <div class="card" id="aboutText"></div>
  </div>

  <div class="section">
    <h2 id="menuTitle"></h2>

    <button class="cta" onclick="updateMenu()">Update Menu</button>

    <div class="grid" id="menu"></div>
  </div>

  <div class="section">
    <h2 id="reservationTitle"></h2>
    <div class="card" id="reservationBox">
      <p id="reservationText"></p>
      <div class="cta" onclick="reserveNow()" id="reservationBtn"></div>
    </div>
  </div>

  <div class="section">
    <h2 id="contactTitle"></h2>
    <div class="contact">
      Innsbruck, Austria<br>
      +43 000 000000<br>
      hello@hotpan.at
    </div>
  </div>

</div>

<script>

const content = {

  en: {
    tagline: "real food. zero friction.",
    aboutTitle: "About",
    aboutText: "A fast kitchen built for real life. No waiting. No confusion. Just food done right.",
    menuTitle: "Menu",
    reservationTitle: "Reservation",
    reservationText: "Book your table in seconds.",
    reservationBtn: "Reserve now",
    contactTitle: "Contact",
    menu: [
      ["Grilled Chicken Bowl", "12€"],
      ["Hot Pan Noodles", "11€"],
      ["Vegetable Stir Fry", "10€"]
    ]
  },

  de: {
    tagline: "einfach essen. ohne warten.",
    aboutTitle: "Über uns",
    aboutText: "Eine schnelle Küche für den Alltag. Kein Warten. Keine Umwege. Einfach gutes Essen.",
    menuTitle: "Menü",
    reservationTitle: "Reservierung",
    reservationText: "Reservieren Sie in wenigen Sekunden.",
    reservationBtn: "Jetzt reservieren",
    contactTitle: "Kontakt",
    menu: [
      ["Hähnchen Bowl", "12€"],
      ["Hot Pan Nudeln", "11€"],
      ["Gemüse Pfanne", "10€"]
    ]
  },

  it: {
    tagline: "cibo vero. senza attesa.",
    aboutTitle: "Chi siamo",
    aboutText: "Una cucina veloce per la vita reale. Niente attese. Solo buon cibo.",
    menuTitle: "Menu",
    reservationTitle: "Prenotazione",
    reservationText: "Prenota il tuo tavolo in pochi secondi.",
    reservationBtn: "Prenota ora",
    contactTitle: "Contatto",
    menu: [
      ["Pollo alla griglia", "12€"],
      ["Noodles Hot Pan", "11€"],
      ["Verdure saltate", "10€"]
    ]
  }

};

let currentLang = "en";

function setLang(lang, el) {
  currentLang = lang;

  document.querySelectorAll(".lang").forEach(e => e.classList.remove("active"));
  el.classList.add("active");

  render();
}

function render() {
  const data = content[currentLang];

  document.getElementById("tagline").innerText = data.tagline;
  document.getElementById("aboutTitle").innerText = data.aboutTitle;
  document.getElementById("aboutText").innerText = data.aboutText;
  document.getElementById("menuTitle").innerText = data.menuTitle;
  document.getElementById("reservationTitle").innerText = data.reservationTitle;
  document.getElementById("reservationText").innerText = data.reservationText;
  document.getElementById("reservationBtn").innerText = data.reservationBtn;
  document.getElementById("contactTitle").innerText = data.contactTitle;

  renderMenu(data.menu);
}

function renderMenu(menuData) {
  const menuContainer = document.getElementById("menu");
  menuContainer.innerHTML = "";

  menuData.forEach(item => {
    const div = document.createElement("div");
    div.className = "card fade";
    div.innerHTML = `
      <div class="menu-item">
        <span>${item[0]}</span>
        <span>${item[1]}</span>
      </div>
    `;
    menuContainer.appendChild(div);
  });
}

function updateMenu() {
  const newMenu = [
    ["Beef Hot Pan", "13€"],
    ["Spicy Noodles", "11€"],
    ["Tofu Bowl", "10€"]
  ];

  content[currentLang].menu = newMenu;
  render();
}

function reserveNow() {
  document.getElementById("reservationBox").innerHTML = "<p>Table booked ✓</p>";
}

render();

</script>

</body>
</html>
